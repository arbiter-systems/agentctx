name: ci

"on":
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: "ci-${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Typecheck root
        run: npm run typecheck

      - name: Test root
        run: npm test

      - name: Build root
        run: npm run build

      - name: Install extension dependencies
        run: npm ci --prefix extensions/vscode

      - name: Typecheck extension
        run: npm run typecheck --prefix extensions/vscode

      - name: Test extension
        run: npm test --prefix extensions/vscode

      - name: Build extension
        run: npm run build --prefix extensions/vscode

      - name: Package extension
        run: npm run package --prefix extensions/vscode

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: instructov-vscode
          path: extensions/vscode/package/instructov-vscode.vsix
          if-no-files-found: error
